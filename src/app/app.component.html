<app-splash-screen [visible]="showSplash()" />

<div class="app-shell">
  <header class="app-shell__header" role="banner">
    <div class="app-shell__brand">
      <span class="app-shell__logo-icon" aria-hidden="true">🎣</span>
      <div class="app-shell__brand-text">
        <h1 class="app-shell__logo-text">MoonBite</h1>
        <span class="app-shell__tagline">Your daily fishing intelligence</span>
      </div>
    </div>
    <time class="app-shell__date" [attr.datetime]="todayLabel()">{{ todayLabel() }}</time>
  </header>

  <main class="app-shell__content">
    <router-outlet />
  </main>

  <app-bottom-nav />
</div>
